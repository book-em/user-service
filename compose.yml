services:
  user-service:
    container_name: bookem-user-service
    image: magley/bookem-user-service
    restart: always
    build: ./src
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bookem_userdb_db
      DB_USER: bookem_userdb_user
      DB_PASSWORD: password123
    depends_on:
      - db

  db:
    image: postgres:alpine
    restart: always
    container_name: bookem-user-service-db
    environment:
      POSTGRES_DB: bookem_userdb_db
      POSTGRES_USER: bookem_userdb_user
      POSTGRES_PASSWORD: password123
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:   
    image: adminer:4.8.0-standalone
    restart: always
    container_name: bookem-user-service-adminer
    ports:
      - "8002:8080"

volumes:
  pgdata:
    name: bookem-user-service-db-volume
